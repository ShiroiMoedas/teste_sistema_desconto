name: Python Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar repositório
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 📦 Atualizar pip
      run: python -m pip install --upgrade pip

    - name: 🧪 Executar testes
      run: |
        python -c "from desconto import calcular; print('Teste 1:', calcular(100,10)); print('Teste 2:', calcular(200,50))"